<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Last Night On Earth — Lyric Reel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="grain"></div>
<div class="glow"></div>

<header>
  <div class="eyebrow">Now Spinning</div>
  <h1>LAST NIGHT<br><span>ON EARTH</span></h1>
  <div class="artist">Green Day — Lyric</div>
</header>

<div class="stage">
  <div class="rig">
    <div class="plinth"></div>
    <div class="disc" id="disc">
      <div class="label">
      </div>
      <div class="spindle"></div>
    </div>

    <div class="tonearm" id="tonearm">
      <svg viewBox="0 0 200 200">
        <line x1="180" y1="16" x2="55" y2="150" stroke="#2b2621" stroke-width="7" stroke-linecap="round"/>
        <circle cx="180" cy="16" r="12" fill="#2b2621"/>
        <g class="needle-glow">
          <circle cx="55" cy="150" r="6" fill="#ff6a1a"/>
        </g>
      </svg>
    </div>
  </div>

  <div class="readout">
    <div class="line" id="lyricLine"><span class="cursor"></span></div>
    <div class="progress-dots" id="dots"></div>
  </div>
</div>

<div class="controls">
  <button id="playBtn">▶ Drop the needle</button>
  <button class="ghost" id="resetBtn">Restart</button>
</div>


<script src="script.js"></script>
</body>
</html>
